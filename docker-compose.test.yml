# ============================================================
# MasterLife V3.0 测试环境 Docker Compose (简化版)
# 包含：App + MySQL + Redis
# ============================================================

version: '3.8'

services:
  # ======================== MySQL ========================
  mysql:
    image: mysql:8.0
    container_name: masterlife-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test123456
      MYSQL_DATABASE: pengcheng-system
      MYSQL_USER: pengcheng_app
      MYSQL_PASSWORD: test123456
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - masterlife-net

  # ======================== Redis ========================
  redis:
    image: redis:7-alpine
    container_name: masterlife-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - masterlife-net

volumes:
  mysql-data:
  redis-data:

networks:
  masterlife-net:
    driver: bridge
