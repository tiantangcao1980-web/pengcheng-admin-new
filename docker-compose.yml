# ============================================================
# MasterLife V3.0 Docker Compose
# 包含: App + MySQL + Redis + PostgreSQL(PGVector) + kkFileView + Nginx
# ============================================================

version: '3.8'

services:
  # ======================== 应用服务 ========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: masterlife-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=pengcheng-system
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=pengcheng_vector
      - PG_USERNAME=${PG_USERNAME:-postgres}
      - PG_PASSWORD=${PG_PASSWORD}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - masterlife-net

  # ======================== MySQL ========================
  mysql:
    image: mysql:8.0
    container_name: masterlife-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: pengcheng-system
      MYSQL_USER: ${DB_USERNAME:-pengcheng_app}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --max-connections=500
      --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - masterlife-net

  # ======================== Redis ========================
  redis:
    image: redis:7-alpine
    container_name: masterlife-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping 2>/dev/null | grep PONG || redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - masterlife-net

  # ======================== PostgreSQL + PGVector ========================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: masterlife-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pengcheng_vector
      POSTGRES_USER: ${PG_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - masterlife-net

  # ======================== MinIO (文件存储) ========================
  minio:
    image: minio/minio:latest
    container_name: masterlife-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - masterlife-net

  # ======================== kkFileView (文件预览) ========================
  kkfileview:
    image: keking/kkfileview:latest
    container_name: masterlife-kkfileview
    restart: unless-stopped
    ports:
      - "8012:8012"
    environment:
      KK_FILE_DIR: /opt/kkFileView-4.4.0-beta/file
    volumes:
      - kkfileview-data:/opt/kkFileView-4.4.0-beta/file
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - masterlife-net

  # ======================== OnlyOffice Document Server ========================
  onlyoffice:
    image: onlyoffice/documentserver:8.2
    container_name: masterlife-onlyoffice
    restart: unless-stopped
    profiles:
      - optional
    ports:
      - "8443:443"
    environment:
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-masterlife_onlyoffice_secret}
      JWT_ENABLED: "true"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - masterlife-net

  # ======================== Nginx (反向代理) ========================
  nginx:
    image: nginx:alpine
    container_name: masterlife-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./pengcheng-starter/src/main/resources/static:/usr/share/nginx/html:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - masterlife-net

  # ======================== Prometheus ========================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: masterlife-prometheus
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - masterlife-net

  # ======================== Loki（日志聚合） ========================
  loki:
    image: grafana/loki:2.9.0
    container_name: masterlife-loki
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - masterlife-net

  # ======================== Grafana ========================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: masterlife-grafana
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-masterlife2024}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/v4-mvp-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - masterlife-net

# ======================== Volumes ========================
volumes:
  mysql-data:
  redis-data:
  postgres-data:
  minio-data:
  app-uploads:
  app-logs:
  kkfileview-data:
  onlyoffice-data:
  onlyoffice-logs:
  nginx-logs:
  prometheus-data:
  loki-data:
  grafana-data:

# ======================== Networks ========================
networks:
  masterlife-net:
    driver: bridge
