spring:
  application:
    name: MasterLife
  profiles:
    active: dev

# Knife4j / OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-flat-param-object: true

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  basic:
    enable: false
    username: admin
    password: admin

# 服务器配置
server:
  port: 8080

pengcheng:
  feature:
    tenant: false  # Phase 6 启用多租户行过滤；true 时激活 TenantInterceptor
    alipay:
      enabled: false
    wechat:
      mp:
        enabled: false
      mini:
        enabled: false
      pay:
        enabled: false
  observability:
    loki-url: ${LOKI_URL:http://loki:3100/loki/api/v1/push}

# ==================== 可观测性配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.data.repository.invocations: true
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    redis:
      enabled: true
