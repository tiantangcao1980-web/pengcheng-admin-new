server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pengcheng-system}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:test123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: 5000ms

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:${SPRING_AI_DASHSCOPE_API_KEY:sk-test-key}}
      chat:
        api-key: ${SPRING_AI_DASHSCOPE_CHAT_API_KEY:${DASHSCOPE_API_KEY:${SPRING_AI_DASHSCOPE_API_KEY:sk-test-key}}}
    # PGVector 向量库：dev 默认关闭（spring-ai-starter-vector-store-pgvector AutoConfiguration
    # 在 initialize-schema=false 且未配置 datasource 时 Bean 不会激活，启动无副作用）
    vectorstore:
      pgvector:
        initialize-schema: false
        # 启用步骤：
        #   1) 启动 docker-compose 中的 pgvector 服务
        #   2) 去掉下方注释并填写 DB 连接信息
        # datasource:
        #   url: jdbc:postgresql://localhost:5433/pengcheng_vector
        #   username: postgres
        #   password: postgres
        # dimensions: 1536
        # index-type: ivfflat
        # distance-type: cosine_distance

  flyway:
    enabled: true
    validate-on-migrate: false
    baseline-on-migrate: true
    baseline-version: 0
    repair-on-migrate: true
    locations: classpath:db/migration

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

# AI 配置
ai:
  chat-model: ${AI_CHAT_MODEL:qwen-plus}
  embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v3}

# OnlyOffice
onlyoffice:
  server-url: ${ONLYOFFICE_SERVER_URL:https://localhost:8443}
  jwt-secret: ${ONLYOFFICE_JWT_SECRET:masterlife_onlyoffice_secret}

# 应用配置
app:
  file-access-url: ${APP_FILE_ACCESS_URL:http://host.docker.internal:8080/api/files}
  wopi-access-url: ${APP_WOPI_ACCESS_URL:http://host.docker.internal:8080/api}
